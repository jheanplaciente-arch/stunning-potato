<style>
  /* Sage green background with clover pattern */
  body {
    background-color: #B2AC88;
    background-image: url('https://www.transparenttextures.com'); /* Subtle texture */
  }

  /* Main Profile Card */
  #main > .inner {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 2rem;
    padding: 2rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    animation: float 5s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  /* Social Navigation Buttons */
  .social-nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
  }

  .nav-btn {
    padding: 10px 20px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
    color: white;
  }

  .facebook { background-color: #1877F2; }
  .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

  .nav-btn:hover {
    transform: scale(1.1);
    filter: brightness(1.1);
  }
</style>

<div class="social-nav">
  <a href="#" class="nav-btn facebook">Facebook</a>
  <a href="#" class="nav-btn instagram">Instagram</a>
</div>
